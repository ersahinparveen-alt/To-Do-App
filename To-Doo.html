<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="To-Doo.css">
</head>

<body>

    <div class="container">

        <div class="todo-app">

            <h1>To-Do App</h1>

            <div class="start-container">

                <div class="details">

                    <h3>Keep it up!</h3>

                    <p>Complete your tasks one by one.</p>

                    <div id="progressbar">
                        <div id="progress"></div>
                    </div>

                </div>


                <div class="start-number">

                    <p id="numbers">0 / 0</p>

                </div>

            </div>



            <form class="input-area">

                <input
                    type="text"
                    id="task-input"
                    placeholder="Add a new task..."
                >

                <button type="submit" id="add-task-btn">

                    <i class="fa-solid fa-plus"></i>

                </button>

            </form>



            <div class="todos-container">

                <ul id="task-list"></ul>

            </div>

            <!--
            <img
                class="empty-image"
                src="camel.webp"
                alt="Empty"
            >
            -->

        </div>

    </div>

    <script src="To-Doo.js"></script>

</body>
</html>
